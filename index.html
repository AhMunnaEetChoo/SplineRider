<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spline Rider</title>
  <style>
    :root {
      --color-bg: #191930;
      --color-bg-secondary: #263d6e;
      --color-accent: #2f729e;
      --color-warn: #eba254;
      --color-highlight: #f5d689;
      --color-text: #fff5d9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--color-bg); touch-action: manipulation; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      color: var(--color-text);
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="timer">Time: 0.00s</div>
    <div id="speed">Speed: 0.0</div>
    <div id="state">State: idle</div>
  </div>
  <script>
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('unpkg.com')) {
        var msg = document.createElement('div');
        msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--color-warn);font-family:monospace;font-size:16px;text-align:center;max-width:80%;';
        msg.textContent = 'Failed to load game assets. Please check your internet connection and try again.';
        document.body.appendChild(msg);
        document.getElementById('ui').style.display = 'none';
      }
    }, true);
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.171.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
